version: '3.8'

services:
  nebula:
    image: ghcr.io/peachmmz/nebula:latest
    container_name: nebula
    restart: unless-stopped
    ports:
      - "9050:9050"
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - GIN_MODE=release
      - SERVER_ADDRESS=:9050
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-CHANGE_THIS_PASSWORD}
    networks:
      - nebula-network

networks:
  nebula-network:
    driver: bridge
