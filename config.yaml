# Nebula 配置文件
# 所有配置项都可以通过环境变量覆盖

server:
  address: ":9050"

database:
  dsn: "nebula.db"

storage:
  type: "local"  # 本地存储 (未来支持: oss, s3)
  basePath: "./uploads"
  baseUrl: "http://localhost:9050/files"

jwt:
  secret: "dev-secret-key-change-in-production"
  accessTokenDuration: 7200    # 2 小时 (秒)
  refreshTokenDuration: 604800  # 7 天 (秒)

# 管理员账号配置
# ⚠️ 生产环境请通过环境变量设置或修改此处密码
admin:
  username: "admin"
  password: "admin123"
