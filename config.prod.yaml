server:
  address: ":9050"
  mode: "prod"

database:
  dsn: "nebula.db"

storage:
  type: "local"
  basePath: "./uploads"
  baseUrl: "http://localhost:9050/files"

jwt:
  secret: "change-this-secret-in-production"
  accessTokenDuration: 7200
  refreshTokenDuration: 604800

frontend:
  enabled: true
  path: "./web/dist"

# ⚠️ 生产环境管理员账号 - 请务必修改密码！
admin:
  username: "admin"
  password: "CHANGE_THIS_PASSWORD"
